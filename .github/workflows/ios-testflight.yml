name: Deploy to TestFlight

on:
  push:
    branches: [master]
    paths:
      - 'iOS/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

env:
  SCHEME: BipolarAI
  BUNDLE_ID: jp.mt-inn.bipolarai

jobs:
  build-and-deploy:
    runs-on: macos-14
    defaults:
      run:
        working-directory: iOS

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest available Xcode 16 on macos-14 runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Code Signing ──────────────────────────────────
      - name: Install Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Decode certificate and provisioning profile
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Use printf + openssl for reliable binary decoding on macOS
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | openssl base64 -d -A > $CERTIFICATE_PATH
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | openssl base64 -d -A > $PROFILE_PATH

          # Verify decoded files
          echo "Certificate .p12 size: $(wc -c < $CERTIFICATE_PATH) bytes"
          echo "Provisioning profile size: $(wc -c < $PROFILE_PATH) bytes"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i $PROFILE_PATH | \
            grep -A1 UUID | grep string | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          echo "Certificate and provisioning profile installed successfully"

      # ── Build Archive ──────────────────────────────────
      - name: Archive for distribution
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project BipolarAI.xcodeproj \
            -scheme $SCHEME \
            -archivePath $RUNNER_TEMP/BipolarAI.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="BipolarAI AppStore Distribution"

      # ── Export IPA ──────────────────────────────────
      - name: Create ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>jp.mt-inn.bipolarai</key>
              <string>BipolarAI AppStore Distribution</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/BipolarAI.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      # ── Upload to TestFlight ──────────────────────────
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # Decode API key
          mkdir -p ~/private_keys
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | openssl base64 -d -A \
            > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          # Upload IPA using xcrun notarytool / altool
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          if [ -n "$IPA_PATH" ]; then
            echo "Uploading IPA: $IPA_PATH"
            xcrun altool --upload-app \
              --type ios \
              --file "$IPA_PATH" \
              --apiKey $APP_STORE_CONNECT_API_KEY_ID \
              --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
            echo "✅ Upload to TestFlight succeeded!"
          else
            echo "❌ IPA not found in export directory"
            ls -la $RUNNER_TEMP/export/ || echo "Export directory does not exist"
            exit 1
          fi

      # ── Cleanup ──────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision
          rm -rf ~/private_keys
